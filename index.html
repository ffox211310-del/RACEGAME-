<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>連打レース進化版</title>
<style>
body {
  margin: 0;
  overflow: hidden;
}

/* 地面（ストライプ） */
#game {
  width: 100vw;
  height: 100vh;
  position: relative;
  background: repeating-linear-gradient(
    to bottom,
    #555 0px,
    #555 40px,
    #666 40px,
    #666 80px
  );
}

.car {
  width: 50px;
  height: 80px;
  position: absolute;
}

#player {
  background: red;
  left: 30%;
  bottom: 100px;
}

#enemy {
  background: blue;
  left: 60%;
  bottom: 100px;
}

#ui {
  position: absolute;
  top: 10px;
  left: 10px;
  color: white;
  font-size: 20px;
}
</style>
</head>
<body>

<div id="game">
  <div id="player" class="car"></div>
  <div id="enemy" class="car"></div>
  <div id="ui">連打で加速！</div>
</div>

<script>
const game = document.getElementById("game");
const player = document.getElementById("player");
const enemy = document.getElementById("enemy");

let playerSpeed = 0;
let enemySpeed = 5;

let distancePlayer = 0;
let distanceEnemy = 0;

let bgOffset = 0;

// 連打
document.addEventListener("touchstart", () => {
  playerSpeed += 1.5;
});

// ループ
function gameLoop() {

  // 減速
  playerSpeed *= 0.98;
  if (playerSpeed > 15) playerSpeed = 15;

  // 敵
  enemySpeed = 5 + Math.sin(Date.now() / 300) * 1.5;

  // 距離
  distancePlayer += playerSpeed;
  distanceEnemy += enemySpeed;

  // 背景スクロール
  bgOffset += playerSpeed;
  game.style.backgroundPositionY = bgOffset + "px";

  // 車の位置（差で前後）
  let diff = distancePlayer - distanceEnemy;

  player.style.bottom = (100 + diff * 0.1) + "px";
  enemy.style.bottom = (100 - diff * 0.1) + "px";

  // UI
  document.getElementById("ui").innerText =
    "自分: " + Math.floor(distancePlayer) + "m\n" +
    "敵: " + Math.floor(distanceEnemy) + "m\n" +
    "速度: " + playerSpeed.toFixed(1);

  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
