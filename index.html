<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>連打レース</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

#game {
  width: 100vw;
  height: 100vh;
  background: gray;
  position: relative;
}

.car {
  width: 50px;
  height: 80px;
  position: absolute;
  bottom: 50px;
}

#player {
  background: red;
  left: 30%;
}

#enemy {
  background: blue;
  left: 60%;
}

#ui {
  position: absolute;
  top: 10px;
  left: 10px;
  color: white;
  font-size: 20px;
}
</style>
</head>
<body>

<div id="game">
  <div id="player" class="car"></div>
  <div id="enemy" class="car"></div>
  <div id="ui">連打で加速！</div>
</div>

<script>
let playerSpeed = 0;
let enemySpeed = 4;

let distancePlayer = 0;
let distanceEnemy = 0;

// 連打で加速
document.addEventListener("touchstart", () => {
  playerSpeed += 1.5; // ←連打パワー
});

// ゲームループ
function gameLoop() {

  // 減速（摩擦）
  playerSpeed *= 0.98;

  // 上限
  if (playerSpeed > 15) playerSpeed = 15;

  // 敵は一定
  enemySpeed = 6;

  // 距離加算
  distancePlayer += playerSpeed;
  distanceEnemy += enemySpeed;

  // 表示
  document.getElementById("ui").innerText =
    "自分: " + Math.floor(distancePlayer) + "m\n" +
    "敵: " + Math.floor(distanceEnemy) + "m\n" +
    "速度: " + playerSpeed.toFixed(1);

  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
