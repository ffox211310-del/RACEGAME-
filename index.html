<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>連打レース完成版</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: sans-serif;
}

/* ゲーム画面 */
#game {
  width: 100vw;
  height: 100vh;
  position: absolute;
  background: url("RoadNew.png");
  background-size: cover;
}

/* 車（絵文字） */
.car {
  position: absolute;
  font-size: 150px;
}

#player {
  left: 30%;
  bottom: 100px;
}

#enemy {
  left: 60%;
  bottom: 100px;
}

/* UI */
#ui {
  position: absolute;
  top: 10px;
  left: 10px;
  color: black;
  font-size: 50px;
}

/* スタート画面 */
#startScreen, #countdown, #result {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 70px;
  z-index: 10;
}
</style>
</head>
<body>

<div id="game">
  <div id="player" class="car">🏎️</div>
  <div id="enemy" class="car">🚌</div>
  <div id="ui"></div>

  <div id="startScreen">タップでSTART</div>
  <div id="countdown" style="display:none;"></div>
  <div id="result" style="display:none;"></div>
</div>

<script>
const game = document.getElementById("game");
const player = document.getElementById("player");
const enemy = document.getElementById("enemy");
const ui = document.getElementById("ui");

const startScreen = document.getElementById("startScreen");
const countdownEl = document.getElementById("countdown");
const resultEl = document.getElementById("result");

let playerSpeed = 0;
let enemySpeed = 5;

let distancePlayer = 0;
let distanceEnemy = 0;

let bgOffset = 0;
let running = false;

// スタート
startScreen.addEventListener("touchstart", startGame);

function startGame() {
  startScreen.style.display = "none";
  countdownEl.style.display = "flex";

  let count = 3;
  countdownEl.innerText = count;

  let timer = setInterval(() => {
    count--;
    if (count > 0) {
      countdownEl.innerText = count;
    } else if (count === 0) {
      countdownEl.innerText = "GO!";
    } else {
      clearInterval(timer);
      countdownEl.style.display = "none";
      running = true;
      gameLoop();
    }
  }, 1000);
}

// 連打
document.addEventListener("touchstart", () => {
  if (running) playerSpeed += 1.5;
});

// ループ
function gameLoop() {
  if (!running) return;

  playerSpeed *= 0.98;
  if (playerSpeed > 15) playerSpeed = 15;

  enemySpeed = 5 + Math.sin(Date.now()/300)*1.5;

  distancePlayer += playerSpeed;
  distanceEnemy += enemySpeed;

  // 背景スクロール
  bgOffset += playerSpeed;
  game.style.backgroundPositionY = bgOffset + "px";

  // 位置調整
  let diff = distancePlayer - distanceEnemy;
  player.style.bottom = (100 + diff * 0.1) + "px";
  enemy.style.bottom = (100 - diff * 0.1) + "px";

  // UI
  ui.innerText =
    "自分: " + Math.floor(distancePlayer) + "m\n" +
    "敵: " + Math.floor(distanceEnemy) + "m";

  // ゴール
  if (distancePlayer >= 1000 || distanceEnemy >= 1000) {
    running = false;
    resultEl.style.display = "flex";

    if (distancePlayer > distanceEnemy) {
      resultEl.innerText = "勝ち！🏆";
    } else {
      resultEl.innerText = "負け…";
    }
    return;
  }

  requestAnimationFrame(gameLoop);
}
</script>

</body>
</html>
